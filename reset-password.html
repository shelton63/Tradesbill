<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhranFjb2p1ZnF5cGJwc2VybHRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MDcxNzQsImV4cCI6MjA5ODA4MzE3NH0.39yk25pGqGbH_mcMCuVpfbKLj00KdPeHOArQKU9uPrE';

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FAFAF8; min-height: 100vh; display: flex; flex-direction: column; }
    .nav { background: #0A2540; padding: 14px 40px; display: flex; align-items: center; }
    .nav-logo { font-size: 18px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-logo i { color: #5DCAA5; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #E5E3DC; width: 100%; max-width: 420px; overflow: hidden; }
    .card-header { background: #0A2540; padding: 32px 36px 28px; text-align: center; }
    .logo { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 22px; }
    .logo-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
    .logo-icon i { color: #fff; font-size: 22px; }
    .logo-text { font-size: 20px; font-weight: 600; color: #fff; }
    .card-header h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .card-header p { font-size: 14px; color: rgba(255,255,255,0.78); }
    .card-body { padding: 28px 36px 32px; }
    .msg { border-radius: 8px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; display: none; align-items: center; gap: 8px; }
    .msg.error { background: #FCEBEB; border: 1px solid #F09595; color: #D14343; }
    .msg.success { background: #E1F5EE; border: 1px solid #9FE1CB; color: #085041; }
    .msg i { font-size: 17px; flex-shrink: 0; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #6B6A65; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #8B8A84; pointer-events: none; }
    .input-wrap input { padding-left: 42px; }
    input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #E5E3DC; border-radius: 8px; font-size: 14px; color: #1A1A18; background: #fff; outline: none; font-family: inherit; }
    input:focus { border-color: #0A2540; box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
    input::placeholder { color: #A3A29C; }
    .btn-submit { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; background: #0A2540; color: #fff; transition: background 0.15s; font-family: inherit; }
    .btn-submit:hover { background: #0A2540; }
    .btn-submit:disabled { background: #7AADD4; cursor: not-allowed; }
    .footer { background: #061A30; padding: 18px 40px; text-align: center; }
    .footer p { font-size: 12px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo"><i class="ti ti-file-invoice"></i> TradesBill</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <div class="logo">
          <div class="logo-icon"><i class="ti ti-file-invoice"></i></div>
          <span class="logo-text">TradesBill</span>
        </div>
        <h1>Set new password</h1>
        <p>Choose a new password for your account</p>
      </div>
      <div class="card-body">
        <div class="msg error" id="error-msg"><i class="ti ti-alert-circle"></i><span id="error-text"></span></div>
        <div class="msg success" id="success-msg"><i class="ti ti-circle-check"></i><span>Password updated! Redirecting you to login...</span></div>

        <div class="field">
          <label for="password">New password</label>
          <div class="input-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" id="password" placeholder="Min. 8 characters" />
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="confirm">Confirm new password</label>
          <div class="input-wrap">
            <i class="ti ti-lock"></i>
            <input type="password" id="confirm" placeholder="Repeat new password" />
          </div>
        </div>
        <button class="btn-submit" type="button" onclick="handleReset()" style="margin-top:14px">Update password →</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 TradesBill &middot; Built for UK tradespeople &middot; Payments powered by Stripe</p>
  </footer>

  <script>
    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.querySelector('.btn-submit');
      const errEl = document.getElementById('error-msg');
      const okEl = document.getElementById('success-msg');
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password.length < 8) { document.getElementById('error-text').textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'flex'; return; }
      if (password !== confirm) { document.getElementById('error-text').textContent = 'Passwords do not match.'; errEl.style.display = 'flex'; return; }

      btn.textContent = 'Updating...';
      btn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        document.getElementById('error-text').textContent = error.message;
        errEl.style.display = 'flex';
        btn.textContent = 'Update password →';
        btn.disabled = false;
      } else {
        okEl.style.display = 'flex';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      }
    }
  </script>
</body>
</html>
