<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming your account — TradesBill</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = 'YOUR_PROJECT_URL_HERE';
    var SUPABASE_KEY = 'YOUR_ANON_KEY_HERE';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #185FA5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
    }
    .icon-loading { background: #E6F1FB; animation: pulse 1.2s ease-in-out infinite; }
    .icon-success { background: #E1F5EE; }
    .icon-error { background: #FCEBEB; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    h2 { font-size: 20px; font-weight: 600; color: #042C53; margin-bottom: 8px; }
    p { font-size: 14px; color: #5F5E5A; line-height: 1.6; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #B5D4F4;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #185FA5;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon icon-loading" id="icon">
      <div class="spinner"></div>
    </div>
    <h2 id="title">Confirming your account...</h2>
    <p id="msg">Please wait a moment while we verify your email.</p>
  </div>

  <script>
    async function handleCallback() {
      try {
        // Exchange the code/token in the URL for a session
        const { data, error } = await supabase.auth.getSession();

        if (error) throw error;

        if (data.session) {
          // Session confirmed — redirect to dashboard cleanly
          document.getElementById('icon').innerHTML = '✅';
          document.getElementById('icon').className = 'icon icon-success';
          document.getElementById('title').textContent = 'Email confirmed!';
          document.getElementById('msg').textContent = 'Taking you to your dashboard...';
          setTimeout(() => { window.location.replace('dashboard.html'); }, 1200);
        } else {
          // Try exchanging code from URL params (PKCE flow)
          const params = new URLSearchParams(window.location.search);
          const hashParams = new URLSearchParams(window.location.hash.substring(1));

          const code = params.get('code');
          const accessToken = hashParams.get('access_token');
          const type = params.get('type') || hashParams.get('type');

          if (code) {
            const { data: exchangeData, error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);
            if (exchangeError) throw exchangeError;
            document.getElementById('icon').innerHTML = '✅';
            document.getElementById('icon').className = 'icon icon-success';
            document.getElementById('title').textContent = 'Email confirmed!';
            document.getElementById('msg').textContent = 'Taking you to your dashboard...';
            setTimeout(() => { window.location.replace('dashboard.html'); }, 1200);
          } else if (accessToken) {
            // Set session from token then redirect cleanly without token in URL
            await supabase.auth.setSession({
              access_token: accessToken,
              refresh_token: hashParams.get('refresh_token')
            });
            document.getElementById('icon').innerHTML = '✅';
            document.getElementById('icon').className = 'icon icon-success';
            document.getElementById('title').textContent = 'Email confirmed!';
            document.getElementById('msg').textContent = 'Taking you to your dashboard...';
            setTimeout(() => { window.location.replace('dashboard.html'); }, 1200);
          } else {
            throw new Error('No confirmation code found. The link may have expired.');
          }
        }
      } catch (err) {
        document.getElementById('icon').innerHTML = '⚠️';
        document.getElementById('icon').className = 'icon icon-error';
        document.getElementById('title').textContent = 'Something went wrong';
        document.getElementById('msg').textContent = err.message || 'The confirmation link may have expired. Please try signing up again.';
        document.getElementById('card').innerHTML += '<a href="signup.html" class="btn">Back to sign up</a>';
      }
    }

    handleCallback();
  </script>
</body>
</html>
