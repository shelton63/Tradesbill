  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FAFAF8; min-height: 100vh; }
    .db { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 210px; flex-shrink: 0; background: #0A2540; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sb-logo { display: flex; align-items: center; gap: 8px; padding: 20px 16px 24px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
    .sb-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
    .sb-logo-icon i { color: #fff; font-size: 18px; }
    .sb-logo-text { font-size: 16px; font-weight: 600; color: #fff; }
    .sb-nav { padding: 16px 10px; flex: 1; overflow-y: auto; }
    .sb-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; margin-top: 16px; }
    .sb-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 8px; font-size: 13px; color: rgba(255,255,255,0.7); cursor: pointer; margin-bottom: 2px; text-decoration: none; }
    .sb-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sb-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .sb-item i { font-size: 18px; }
    .sb-bottom { padding: 12px 10px; border-top: 0.5px solid rgba(255,255,255,0.1); }
    .sb-user { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; text-decoration: none; }
    .sb-user:hover { background: rgba(255,255,255,0.08); }
    .sb-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .sb-user-name { font-size: 12px; font-weight: 600; color: #fff; }
    .sb-user-plan { font-size: 11px; color: rgba(255,255,255,0.5); }

    /* Main */
    .main { flex: 1; margin-left: 210px; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: #fff; border-bottom: 1px solid #E5E3DC; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar h1 { font-size: 16px; font-weight: 600; color: #061A30; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .btn-new { background: #0A2540; color: #fff; font-size: 13px; font-weight: 600; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-new:hover { background: #061A30; }
    .notif-wrap { position: relative; }
    .notif-wrap i { font-size: 21px; color: #5F5E5A; cursor: pointer; }
    .notif-dot { position: absolute; top: -2px; right: -2px; width: 9px; height: 9px; background: #E04848; border-radius: 50%; border: 1.5px solid #fff; display: none; }
    .notif-dropdown { display: none; position: absolute; top: 32px; right: 0; width: 300px; background: #fff; border: 1px solid #E5E3DC; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; }
    .notif-dropdown.open { display: block; }
    .notif-header { padding: 12px 14px; font-size: 13px; font-weight: 600; color: #061A30; border-bottom: 1px solid #F0EFEA; }
    .notif-empty { padding: 24px; text-align: center; font-size: 13px; color: #8B8A84; }

    .content { padding: 24px 28px; flex: 1; }

    /* Checklist */
    .ob-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .ob-title { font-size: 18px; font-weight: 700; color: #061A30; }
    .ob-sub { font-size: 14px; color: #6B6A65; margin-top: 3px; }
    .ob-progress { display: flex; align-items: center; gap: 10px; }
    .ob-track { width: 120px; height: 5px; background: #E5E3DC; border-radius: 3px; overflow: hidden; }
    .ob-fill { height: 100%; background: #0A2540; border-radius: 3px; transition: width 0.4s ease; }
    .ob-count { font-size: 13px; color: #6B6A65; font-weight: 600; white-space: nowrap; }
    .ob-steps { display: flex; flex-direction: column; gap: 8px; max-width: 680px; }
    .ob-step { display: flex; align-items: center; gap: 14px; padding: 15px 18px; background: #fff; border: 0.5px solid #E5E3DC; border-radius: 12px; text-decoration: none; transition: border-color 0.15s; }
    .ob-step:hover { border-color: #B5CCE0; }
    .ob-step.step-active { border: 1.5px solid #0A2540; }
    .ob-step.step-done { opacity: 0.6; }
    .step-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-icon.done { background: #0A2540; }
    .step-icon.active { background: #EEF3F8; border: 1.5px solid #0A2540; }
    .step-icon.todo { background: #EEF3F8; border: 1.5px solid #E5E3DC; }
    .step-icon i { font-size: 15px; }
    .step-body { flex: 1; min-width: 0; }
    .step-title { font-size: 14px; font-weight: 600; color: #061A30; margin-bottom: 2px; }
    .step-done .step-title { text-decoration: line-through; color: #8B8A84; }
    .step-desc { font-size: 12px; color: #8B8A84; line-height: 1.4; }
    .step-action { flex-shrink: 0; }
    .step-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-family: inherit; }
    .step-btn.primary { background: #0A2540; color: #fff; }
    .step-btn.primary:hover { background: #061A30; }
    .step-btn.purple { background: #635BFF; color: #fff; }
    .step-btn.purple:hover { background: #514ad6; }
    .step-btn.secondary { background: #FAFAF8; color: #0A2540; border: 1px solid #E5E3DC; }
    .step-btn.secondary:hover { background: #EEF3F8; }
    .step-done-badge { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #1D9E75; font-weight: 600; }
    .ob-dismiss { margin-top: 16px; }
    .ob-dismiss a { font-size: 12px; color: #8B8A84; text-decoration: none; }
    .ob-dismiss a:hover { color: #0A2540; }

    /* Mobile */
    .mobile-topbar { display: none; }
    .hero-bar { display: none; }
    .bottom-nav { display: none; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .topbar { display: none; }
      .mobile-topbar { display: flex; align-items: center; justify-content: space-between; background: #0A2540; padding: 16px; }
      .mob-logo { display: flex; align-items: center; gap: 7px; }
      .mob-logo i { color: #5DCAA5; font-size: 22px; }
      .mob-logo span { font-size: 17px; font-weight: 600; color: #fff; }
      .mob-right { display: flex; align-items: center; gap: 12px; }
      .mob-bell { color: rgba(255,255,255,0.8); font-size: 22px; cursor: pointer; }
      .mob-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; text-decoration: none; }
      .hero-bar { display: block; background: #0A2540; padding: 16px 16px 20px; }
      .hero-greet { font-size: 13px; color: rgba(255,255,255,0.75); margin-bottom: 3px; }
      .hero-name { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 16px; }
      .btn-new-mob { background: #fff; color: #0A2540; font-size: 15px; font-weight: 600; padding: 13px 20px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; text-decoration: none; }
      .content { padding: 14px 16px; }
      .ob-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .ob-step { padding: 12px 14px; }
      .bottom-nav { display: flex; align-items: center; background: #fff; border-top: 1px solid #E5E3DC; padding: 8px 0 16px; position: sticky; bottom: 0; z-index: 100; }
      .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; text-decoration: none; }
      .nav-item i { font-size: 22px; color: #A3A29C; }
      .nav-item span { font-size: 10px; color: #A3A29C; font-weight: 500; }
      .nav-item.active i { color: #0A2540; }
      .nav-item.active span { color: #0A2540; font-weight: 600; }
      .nav-plus-wrap { flex: 1; display: flex; justify-content: center; position: relative; }
      .nav-plus { width: 46px; height: 46px; border-radius: 14px; background: #0A2540; display: flex; align-items: center; justify-content: center; margin-top: -22px; cursor: pointer; text-decoration: none; }
      .nav-plus i { font-size: 23px; color: #fff; }
      .plus-menu { display: none; position: absolute; bottom: 62px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #E5E3DC; border-radius: 14px; box-shadow: 0 8px 24px rgba(10,37,64,0.15); width: 190px; overflow: hidden; }
      .plus-menu.open { display: block; }
      .plus-menu-item { display: flex; align-items: center; gap: 10px; padding: 13px 14px; border-bottom: 1px solid #F0EFEA; text-decoration: none; }
      .plus-menu-item:last-child { border-bottom: none; }
      .plus-menu-icon { width: 32px; height: 32px; border-radius: 9px; background: #EEF3F8; display: flex; align-items: center; justify-content: center; }
      .plus-menu-icon i { color: #0A2540; font-size: 17px; }
      .plus-menu-text { font-size: 13px; font-weight: 600; color: #1A1A18; }
    }
  </style>

  <script>
    function initials(first, last, email) {
      const f = (first || '').trim().charAt(0).toUpperCase();
      const l = (last || '').trim().charAt(0).toUpperCase();
      if (f && l) return f + l;
      if (f) return f;
      if (email) return email.charAt(0).toUpperCase();
      return '?';
    }

    function greeting() {
      const h = parseInt(new Intl.DateTimeFormat('en-GB', { hour: 'numeric', hour12: false, timeZone: 'Europe/London' }).format(new Date()));
      if (h < 12) return 'Good morning,';
      if (h < 18) return 'Good afternoon,';
      return 'Good evening,';
    }

    function toggleNotifs() {
      document.getElementById('notif-dropdown').classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.notif-wrap')) document.getElementById('notif-dropdown').classList.remove('open');
      if (!e.target.closest('.nav-plus-wrap')) { const m = document.getElementById('plus-menu'); if (m) m.classList.remove('open'); }
    });

    function renderChecklist(name, meta) {
      const stripeConnected = !!(meta && meta.stripe_connected);
      const hasBusiness = !!(meta && meta.business_name);
      const hasLogo = !!(meta && meta.logo_url);
      const steps = [
        { done: true,          icon: 'ti-check',        title: 'Create your account',       desc: 'You\'re in — welcome to TradesBill.',                             btn: null,       btnClass: null,    href: null },
        { done: hasBusiness,   icon: 'ti-building',     title: 'Add your business details', desc: 'Name, logo, trade type — appears on every invoice.',              btn: 'Set up',   btnClass: 'primary', href: 'settings.html' },
        { done: stripeConnected, icon: 'ti-brand-stripe', title: 'Connect Stripe',          desc: 'Get paid by card or Apple Pay — direct to your bank.',           btn: 'Connect',  btnClass: 'purple',  href: 'onboarding-payments.html' },
        { done: false,         icon: 'ti-file-plus',    title: 'Send your first invoice',   desc: 'Add a customer, describe the job, set the amount — 60 seconds.', btn: 'Create',   btnClass: 'primary', href: 'create-invoice.html' },
        { done: false,         icon: 'ti-user-plus',    title: 'Add your first customer',   desc: 'Save their details so invoicing them next time is instant.',      btn: 'Add',      btnClass: 'secondary', href: 'customers.html' },
        { done: hasLogo,       icon: 'ti-photo',        title: 'Upload your logo',          desc: 'Make your invoices look professional with your branding.',        btn: 'Upload',   btnClass: 'secondary', href: 'settings.html' },
        { done: false,         icon: 'ti-share',        title: 'Refer a tradesperson',      desc: 'Know a builder or plumber who\'d benefit? Pass it on.',           btn: 'Share',    btnClass: 'secondary', href: 'settings.html' },
      ];
      const doneCount = steps.filter(s => s.done).length;
      const total = steps.length;
      const pct = Math.round((doneCount / total) * 100);
      let firstActive = true;

      const stepsHtml = steps.map(s => {
        const isActive = !s.done && firstActive;
        if (!s.done) firstActive = false;
        const iconColor = s.done ? '#fff' : (isActive ? '#0A2540' : '#8B8A84');
        const iconBg = s.done ? '#0A2540' : '#EEF3F8';
        const iconBorder = s.done ? 'none' : (isActive ? '1.5px solid #0A2540' : '1.5px solid #E5E3DC');
        const stepClass = s.done ? 'ob-step step-done' : (isActive ? 'ob-step step-active' : 'ob-step');

        let actionHtml = '';
        if (s.done) {
          actionHtml = `<div class="step-done-badge"><i class="ti ti-circle-check"></i> Done</div>`;
        } else if (s.btn) {
          actionHtml = `<a href="${s.href}" class="step-btn ${s.btnClass}">${s.btn} <i class="ti ti-arrow-right" style="font-size:13px"></i></a>`;
        }

        return `<a href="${s.href || '#'}" class="${stepClass}" onclick="${s.href ? '' : 'return false'}">
          <div class="step-icon" style="background:${iconBg};border:${iconBorder}">
            <i class="ti ${s.done ? 'ti-check' : s.icon}" style="color:${iconColor};font-size:15px"></i>
          </div>
          <div class="step-body">
            <div class="step-title" style="${s.done ? 'text-decoration:line-through;color:#8B8A84' : ''}">${s.title}</div>
            <div class="step-desc">${s.desc}</div>
          </div>
          <div class="step-action">${actionHtml}</div>
        </a>`;
      }).join('');

      document.getElementById('main-content').innerHTML = `
        <div style="max-width:680px">
          <div class="ob-header">
            <div>
              <div class="ob-title">Welcome, ${name}!</div>
              <div class="ob-sub">Complete these steps to start getting paid — takes about 3 minutes.</div>
            </div>
            <div class="ob-progress">
              <div class="ob-track"><div class="ob-fill" style="width:${pct}%"></div></div>
              <div class="ob-count">${doneCount} / ${total}</div>
            </div>
          </div>
          <div class="ob-steps">${stepsHtml}</div>
          <div class="ob-dismiss"><a href="dashboard.html?skip=true">I know what I'm doing — hide this</a></div>
        </div>`;
    }

    async function loadUser() {
      const { data, error } = await supabase.auth.getUser();

      if (error || !data || !data.user) {
        window.location.href = 'login.html';
        return;
      }

      const user = data.user;
      const meta = user.user_metadata || {};

      // Redirect incomplete users to onboarding (unless skipping)
      const params = new URLSearchParams(window.location.search);
      if (!meta.onboarding_complete && params.get('skip') !== 'true') {
        window.location.href = 'welcome.html';
        return;
      }

      // Name and initials
      const first = meta.first_name || meta.given_name || '';
      const last = meta.last_name || meta.family_name || '';
      const fullName = (first || last) ? `${first} ${last}`.trim() : (user.email ? user.email.split('@')[0] : 'there');
      const ini = initials(first, last, user.email);

      // Update sidebar
      const sbAvatar = document.getElementById('sb-avatar'); if (sbAvatar) sbAvatar.textContent = ini;
      const sbName = document.getElementById('sb-user-name'); if (sbName) sbName.textContent = fullName;
      const sbPlan = document.getElementById('sb-user-plan'); if (sbPlan) sbPlan.textContent = meta.plan === 'pro' ? 'Pro plan' : meta.plan === 'business' ? 'Business plan' : 'Free plan';

      // Update mobile
      const mobAvatar = document.getElementById('mob-avatar'); if (mobAvatar) mobAvatar.textContent = ini;
      const heroName = document.getElementById('hero-name'); if (heroName) heroName.textContent = first || fullName;
      const heroGreet = document.getElementById('hero-greet'); if (heroGreet) heroGreet.textContent = greeting();
      const mobHero = document.getElementById('mob-hero');
      if (mobHero && window.innerWidth <= 768) mobHero.style.display = 'block';

      // Always show checklist (no dummy data)
      renderChecklist(first || fullName, meta);
    }

    loadUser();
  </script>

</body>
